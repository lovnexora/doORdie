<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DO OR DIE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #030303;
    --void: #080808;
    --slate: #111111;
    --border: #1e1e1e;
    --border-bright: #2a2a2a;
    --text-dim: #3a3a3a;
    --text-muted: #666;
    --text-base: #aaa;
    --text-bright: #e8e8e8;
    --red: #cc1111;
    --red-bright: #ff1e1e;
    --red-dim: #440808;
    --red-glow: rgba(204, 17, 17, 0.15);
    --green: #0a7a0a;
    --green-bright: #1aaa1a;
    --amber: #aa6600;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text-base);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .header {
    border-bottom: 1px solid var(--border-bright);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    background: var(--void);
  }

  .header-left {}

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 88px);
    line-height: 0.9;
    letter-spacing: 4px;
    color: var(--text-bright);
    display: block;
  }

  .logo span {
    color: var(--red);
  }

  .tagline {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .header-stats {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    line-height: 1;
    color: var(--text-bright);
  }

  .stat-num.red { color: var(--red-bright); }
  .stat-num.green { color: var(--green-bright); }

  .stat-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  /* ADD TASK FORM */
  .add-section {
    border: 1px solid var(--border-bright);
    background: var(--void);
    margin-bottom: 40px;
  }

  .add-section-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .add-section-header::before {
    content: '//';
    color: var(--red);
    font-weight: 700;
  }

  .form-grid {
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .header { padding: 20px; }
    .form-actions { flex-direction: column; }
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-field.full { grid-column: 1 / -1; }

  .field-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .field-label span {
    color: var(--red);
    margin-left: 3px;
  }

  input[type="text"],
  input[type="datetime-local"],
  textarea {
    background: var(--slate);
    border: 1px solid var(--border-bright);
    color: var(--text-bright);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  input[type="datetime-local"] {
    color-scheme: dark;
  }

  input:focus, textarea:focus {
    border-color: var(--red);
  }

  textarea {
    resize: vertical;
    min-height: 70px;
    line-height: 1.5;
  }

  .consequence-field textarea {
    border-color: #2a0a0a;
    background: #0c0303;
  }

  .consequence-field textarea:focus {
    border-color: var(--red);
  }

  .form-actions {
    padding: 0 20px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 24px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
  }

  .btn-primary {
    background: var(--red);
    border-color: var(--red-bright);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--red-bright);
    border-color: var(--red-bright);
    box-shadow: 0 0 20px var(--red-glow);
  }

  .btn-ghost {
    border-color: var(--border-bright);
    color: var(--text-muted);
  }

  .btn-ghost:hover {
    border-color: var(--text-muted);
    color: var(--text-base);
  }

  .btn-danger-ghost {
    border-color: var(--red-dim);
    color: var(--red);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 8px 16px;
  }

  .btn-danger-ghost:hover {
    border-color: var(--red);
    background: var(--red-dim);
  }

  /* TASK LIST */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .list-title {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .list-title::before {
    content: '//';
    color: var(--red);
  }

  .tasks-empty {
    border: 1px dashed var(--border-bright);
    padding: 60px 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* TASK CARD */
  .task-card {
    border: 1px solid var(--border-bright);
    background: var(--void);
    margin-bottom: 16px;
    position: relative;
    transition: border-color 0.3s;
  }

  .task-card.status-active {
    border-color: var(--border-bright);
  }

  .task-card.status-overdue {
    border-color: var(--red);
    animation: pulse-glow 2s ease-in-out infinite;
  }

  .task-card.status-completed {
    border-color: var(--green);
    opacity: 0.6;
  }

  .task-card.status-failed {
    border-color: var(--red-bright);
    background: #0c0202;
    animation: none;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
    50% { box-shadow: 0 0 16px 4px var(--red-glow); }
  }

  .task-top {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .task-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 3vw, 28px);
    letter-spacing: 2px;
    color: var(--text-bright);
    line-height: 1.1;
    flex: 1;
  }

  .status-badge {
    font-size: 9px;
    letter-spacing: 2px;
    font-weight: 700;
    padding: 4px 10px;
    border: 1px solid;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .badge-active { border-color: var(--border-bright); color: var(--text-muted); }
  .badge-overdue { border-color: var(--red); color: var(--red-bright); background: var(--red-dim); }
  .badge-completed { border-color: var(--green); color: var(--green-bright); }
  .badge-failed { border-color: var(--red-bright); color: var(--red-bright); }

  .task-body {
    padding: 12px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
  }

  @media (max-width: 500px) {
    .task-body { grid-template-columns: 1fr; }
  }

  .task-meta {}

  .deadline-row {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .deadline-row span { color: var(--text-base); }

  .countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 5vw, 40px);
    letter-spacing: 3px;
    line-height: 1;
    color: var(--text-bright);
  }

  .countdown.urgent { color: var(--red-bright); }
  .countdown.done { color: var(--text-dim); font-size: 20px; }
  .countdown.executed {
    color: var(--red-bright);
    font-size: clamp(20px, 3vw, 28px);
  }

  .task-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }

  .action-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 14px;
    border: 1px solid;
    cursor: pointer;
    background: transparent;
    transition: all 0.15s;
    min-width: 110px;
    text-align: center;
  }

  .btn-complete {
    border-color: var(--green);
    color: var(--green-bright);
  }

  .btn-complete:hover {
    background: rgba(10, 122, 10, 0.15);
  }

  .btn-fail {
    border-color: var(--red-dim);
    color: var(--red);
  }

  .btn-fail:hover {
    background: var(--red-dim);
  }

  .consequence-block {
    margin: 0 20px 16px;
    border: 1px solid #220808;
    background: #0a0101;
    padding: 10px 14px;
  }

  .consequence-label {
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
  }

  .consequence-text {
    font-size: 12px;
    color: #cc6666;
    line-height: 1.5;
  }

  .task-card.status-failed .consequence-text {
    color: var(--red-bright);
    font-weight: 700;
  }

  .executed-banner {
    display: none;
    padding: 12px 20px;
    background: #150000;
    border-top: 1px solid var(--red);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 5px;
    color: var(--red-bright);
    text-align: center;
  }

  .task-card.status-failed .executed-banner {
    display: block;
  }

  /* CONFIRM MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--void);
    border: 1px solid var(--red);
    padding: 32px;
    max-width: 400px;
    width: 90%;
    text-align: center;
  }

  .modal-icon {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    color: var(--red);
    line-height: 1;
    margin-bottom: 12px;
  }

  .modal-title {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-bright);
    margin-bottom: 8px;
  }

  .modal-body {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--void);
    border: 1px solid var(--red);
    padding: 12px 20px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red-bright);
    z-index: 10000;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.2s;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">DO<span> OR</span> DIE</span>
    <div class="tagline">// accountability system — no mercy, no escape</div>
  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num red" id="stat-failed">0</div>
      <div class="stat-label">Failed</div>
    </div>
  </div>
</div>

<div class="container">

  <!-- ADD TASK -->
  <div class="add-section">
    <div class="add-section-header">NEW COMMITMENT</div>
    <div class="form-grid">
      <div class="form-field">
        <label class="field-label">Task Title <span>*</span></label>
        <input type="text" id="inp-title" placeholder="What must be done?" maxlength="80">
      </div>
      <div class="form-field">
        <label class="field-label">Hard Deadline <span>*</span></label>
        <input type="datetime-local" id="inp-deadline">
      </div>
      <div class="form-field full consequence-field">
        <label class="field-label">Consequence if Failed <span>*</span></label>
        <textarea id="inp-consequence" placeholder="e.g., Delete my gaming folder / Donate $50 to a cause I despise / Give my phone to a sibling for a week..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="clearForm()">CLEAR</button>
      <button class="btn btn-primary" onclick="addTask()">⬛ COMMIT TO THIS</button>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="list-header">
    <div class="list-title">DEATH ROW</div>
    <button class="btn btn-danger-ghost" onclick="showClearAll()">PURGE ALL</button>
  </div>

  <div id="task-list">
    <div class="tasks-empty" id="empty-state">NO ACTIVE COMMITMENTS — ARE YOU SCARED?</div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon">⚠</div>
    <div class="modal-title">IRREVERSIBLE ACTION</div>
    <div class="modal-body" id="modal-msg">This cannot be undone. Are you absolutely sure?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">ABORT</button>
      <button class="btn btn-primary" id="modal-confirm-btn">CONFIRM</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let tasks = JSON.parse(localStorage.getItem('dod-tasks') || '[]');
  let timerInterval = null;
  let pendingAction = null;

  function save() {
    localStorage.setItem('dod-tasks', JSON.stringify(tasks));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function addTask() {
    const title = document.getElementById('inp-title').value.trim();
    const deadline = document.getElementById('inp-deadline').value;
    const consequence = document.getElementById('inp-consequence').value.trim();

    if (!title) { showToast('// TITLE IS REQUIRED'); return; }
    if (!deadline) { showToast('// DEADLINE IS REQUIRED'); return; }
    if (!consequence) { showToast('// CONSEQUENCE IS REQUIRED'); return; }

    const deadlineMs = new Date(deadline).getTime();
    if (deadlineMs <= Date.now()) { showToast('// DEADLINE MUST BE IN THE FUTURE'); return; }

    const task = {
      id: Date.now().toString(),
      title,
      deadline: deadlineMs,
      consequence,
      status: 'active', // active | completed | failed
      createdAt: Date.now()
    };

    tasks.unshift(task);
    save();
    renderAll();
    clearForm();
    showToast('// COMMITTED. NO TURNING BACK.');
  }

  function clearForm() {
    document.getElementById('inp-title').value = '';
    document.getElementById('inp-deadline').value = '';
    document.getElementById('inp-consequence').value = '';
  }

  function markTask(id, status) {
    const task = tasks.find(t => t.id === id);
    if (!task || task.status === 'completed' || task.status === 'failed') return;
    pendingAction = () => {
      task.status = status;
      save();
      renderAll();
      showToast(status === 'completed' ? '// TASK COMPLETED. WELL DONE.' : '// FAILED. EXECUTE THE PENALTY.');
    };
    const msg = status === 'completed'
      ? 'Mark this task as COMPLETED? This cannot be undone.'
      : `Mark this task as FAILED? The consequence will be displayed: "${task.consequence}"`;
    showModal(msg, status === 'completed' ? 'MARK DONE' : 'ACCEPT FAILURE');
  }

  function showClearAll() {
    pendingAction = () => {
      tasks = [];
      save();
      renderAll();
      showToast('// ALL DATA PURGED.');
    };
    showModal('This will permanently erase ALL tasks — active, completed, and failed. Cannot be undone.', 'PURGE EVERYTHING');
  }

  function showModal(msg, confirmLabel) {
    document.getElementById('modal-msg').textContent = msg;
    document.getElementById('modal-confirm-btn').textContent = confirmLabel;
    document.getElementById('modal').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    pendingAction = null;
  }

  document.getElementById('modal-confirm-btn').addEventListener('click', () => {
    if (pendingAction) pendingAction();
    closeModal();
  });

  function formatCountdown(ms) {
    if (ms <= 0) return null;
    const s = Math.floor(ms / 1000);
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 99) {
      const d = Math.floor(h / 24);
      const rh = h % 24;
      return `${d}D ${rh.toString().padStart(2,'0')}H ${m.toString().padStart(2,'0')}M`;
    }
    return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
  }

  function getStatus(task) {
    if (task.status === 'completed') return 'completed';
    if (task.status === 'failed') return 'failed';
    if (Date.now() > task.deadline) return 'overdue';
    return 'active';
  }

  function renderAll() {
    updateStats();
    const container = document.getElementById('task-list');
    if (tasks.length === 0) {
      container.innerHTML = '<div class="tasks-empty" id="empty-state">NO ACTIVE COMMITMENTS — ARE YOU SCARED?</div>';
      return;
    }

    container.innerHTML = tasks.map(task => renderTask(task)).join('');
    tasks.forEach(task => {
      const el = document.getElementById(`task-${task.id}`);
      if (el) el.setAttribute('data-task-id', task.id);
    });
  }

  function renderTask(task) {
    const status = getStatus(task);
    const deadlineDate = new Date(task.deadline).toLocaleString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
    });

    let badgeClass = 'badge-active';
    let badgeLabel = 'ACTIVE';
    if (status === 'overdue') { badgeClass = 'badge-overdue'; badgeLabel = 'OVERDUE'; }
    if (status === 'completed') { badgeClass = 'badge-completed'; badgeLabel = 'COMPLETED'; }
    if (status === 'failed') { badgeClass = 'badge-failed'; badgeLabel = 'FAILED'; }

    const now = Date.now();
    const remaining = task.deadline - now;
    let countdownHtml = '';
    let countdownClass = '';

    if (status === 'completed') {
      countdownHtml = 'DONE';
      countdownClass = 'done';
    } else if (status === 'failed' || status === 'overdue') {
      const overBy = now - task.deadline;
      const s = Math.floor(overBy / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      countdownHtml = `+${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')} PAST`;
      countdownClass = status === 'failed' ? 'executed' : 'urgent';
    } else {
      const fmt = formatCountdown(remaining);
      countdownHtml = fmt || '00:00:00';
      countdownClass = remaining < 3600000 ? 'urgent' : '';
    }

    const actionsHtml = (status === 'active' || status === 'overdue') ? `
      <div class="task-actions">
        <button class="action-btn btn-complete" onclick="markTask('${task.id}', 'completed')">✓ DONE</button>
        <button class="action-btn btn-fail" onclick="markTask('${task.id}', 'failed')">✗ FAILED</button>
      </div>
    ` : '<div class="task-actions"></div>';

    return `
      <div class="task-card status-${status}" id="task-${task.id}" data-task-id="${task.id}">
        <div class="task-top">
          <div class="task-title">${escapeHtml(task.title)}</div>
          <div class="status-badge ${badgeClass}">${badgeLabel}</div>
        </div>
        <div class="task-body">
          <div class="task-meta">
            <div class="deadline-row">DEADLINE: <span>${deadlineDate}</span></div>
            <div class="countdown ${countdownClass}" id="cd-${task.id}">${countdownHtml}</div>
          </div>
          ${actionsHtml}
        </div>
        <div class="consequence-block">
          <div class="consequence-label">⚡ PENALTY IF FAILED</div>
          <div class="consequence-text">${escapeHtml(task.consequence)}</div>
        </div>
        <div class="executed-banner">⬛ STATUS: EXECUTED — PAY YOUR DEBT ⬛</div>
      </div>
    `;
  }

  function updateCountdowns() {
    tasks.forEach(task => {
      const el = document.getElementById(`cd-${task.id}`);
      const card = document.getElementById(`task-${task.id}`);
      if (!el || !card) return;

      const status = getStatus(task);
      const now = Date.now();

      // If task was active but now overdue, re-render
      if (task.status === 'active' && now > task.deadline) {
        if (!card.classList.contains('status-overdue')) {
          renderAll();
          return;
        }
      }

      if (task.status === 'completed' || task.status === 'failed') return;

      const remaining = task.deadline - now;

      if (remaining <= 0) {
        const overBy = now - task.deadline;
        const s = Math.floor(overBy / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        el.textContent = `+${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')} PAST`;
        el.className = 'countdown urgent';
      } else {
        const fmt = formatCountdown(remaining);
        el.textContent = fmt;
        el.className = `countdown ${remaining < 3600000 ? 'urgent' : ''}`;
      }
    });

    updateStats();
  }

  function updateStats() {
    let active = 0, done = 0, failed = 0;
    tasks.forEach(t => {
      const s = getStatus(t);
      if (s === 'active' || s === 'overdue') active++;
      else if (s === 'completed') done++;
      else if (s === 'failed') failed++;
    });
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-failed').textContent = failed;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // Set default datetime to now+1 hour
  const defaultDeadline = new Date(Date.now() + 3600000);
  defaultDeadline.setSeconds(0, 0);
  document.getElementById('inp-deadline').value = defaultDeadline.toISOString().slice(0,16);

  // Init
  renderAll();
  setInterval(updateCountdowns, 1000);
</script>
</body>
</html>
